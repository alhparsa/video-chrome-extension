<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Velocity Player</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="popup-shell">
    <section class="hero">
      <div>
        <p class="eyebrow">Velocity Player</p>
        <h1>Universal media control</h1>
      </div>
      <span class="status-pill" id="status-pill">Checking tab</span>
    </section>

    <section class="card">
      <div class="card-header">
        <div>
          <p class="label">Current media</p>
          <p class="value" id="status-text">Scanning the active tab…</p>
        </div>
        <p class="rate" id="rate-text">1.00x</p>
      </div>

      <label class="slider-block" for="speed-slider">
        <span>Playback speed</span>
        <input id="speed-slider" type="range" min="0.25" max="5" step="0.05" value="1">
      </label>

      <div class="preset-row">
        <button type="button" class="ghost-btn preset-btn" data-speed="1">1.0x</button>
        <button type="button" class="ghost-btn preset-btn" data-speed="1.5">1.5x</button>
        <button type="button" class="ghost-btn preset-btn" data-speed="2">2.0x</button>
      </div>

      <div class="action-grid">
        <button type="button" class="primary-btn" id="fullwindow-btn">Toggle Theater</button>
        <button type="button" class="ghost-btn" id="pip-btn">Picture in Picture</button>
        <button type="button" class="ghost-btn" id="reset-btn">Reset Speed</button>
        <button type="button" class="ghost-btn" id="settings-btn">Settings</button>
      </div>
    </section>
  </main>

  <script src="popup.js"></script>
</body>
</html>
